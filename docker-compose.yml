services:
  postgres:
    image: postgres:16-alpine
    container_name: devpulse_postgres

    environment:
      POSTGRES_USER: ${POSTGRES_USER:-devpulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpulse_password}
      POSTGRES_DB: ${POSTGRES_DB:-devpulse_dev}

    ports:
      - '${POSTGRES_PORT:-5432}:5432'

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-devpulse} -d ${POSTGRES_DB:-devpulse_dev}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: devpulse_redis

    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes

    ports:
      - '${REDIS_PORT:-6379}:6379'

    volumes:
      - redis_data:/data

    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD:-redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: devpulse_pgadmin
    restart: unless-stopped

    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@devpulse.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}

    ports:
      - '${PGADMIN_PORT:-5050}:80'

    depends_on:
      postgres:
        condition: service_healthy

    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
